<!DOCTYPE html>
<html><body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

function drawIcon(size) {
  c.width = size; c.height = size;
  const s = size;

  // rounded rect background
  ctx.beginPath();
  ctx.moveTo(s*0.2, 0);
  ctx.lineTo(s*0.8, 0);
  ctx.quadraticCurveTo(s, 0, s, s*0.2);
  ctx.lineTo(s, s*0.8);
  ctx.quadraticCurveTo(s, s, s*0.8, s);
  ctx.lineTo(s*0.2, s);
  ctx.quadraticCurveTo(0, s, 0, s*0.8);
  ctx.lineTo(0, s*0.2);
  ctx.quadraticCurveTo(0, 0, s*0.2, 0);
  ctx.closePath();
  ctx.fillStyle = '#7bc47f';
  ctx.fill();

  // house
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(s*0.5, s*0.12);
  ctx.lineTo(s*0.12, s*0.48);
  ctx.lineTo(s*0.22, s*0.48);
  ctx.lineTo(s*0.22, s*0.88);
  ctx.lineTo(s*0.45, s*0.88);
  ctx.lineTo(s*0.45, s*0.58);
  ctx.lineTo(s*0.55, s*0.58);
  ctx.lineTo(s*0.55, s*0.88);
  ctx.lineTo(s*0.78, s*0.88);
  ctx.lineTo(s*0.78, s*0.48);
  ctx.lineTo(s*0.88, s*0.48);
  ctx.closePath();
  ctx.fill();

  const link = document.createElement('a');
  link.download = 'icon-' + size + '.png';
  link.href = c.toDataURL();
  link.click();
}

drawIcon(512);
drawIcon(192);
</script>
</body></html>
