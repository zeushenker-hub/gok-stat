<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Опросы — Корпоративный портал</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #fff;
      color: #0D0B68;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 10px;
      gap: 30px;
      width: 1512px;
    }
    .header { display: flex; flex-direction: row; align-items: center; padding: 0; gap: 40px; width: 1314px; height: 59px; }
    .logo-row { display: flex; flex-direction: row; align-items: center; padding: 0; gap: 2px; width: 165px; height: 34px; }
    .logo-shape1 { width: 61.5px; height: 34px; background: #0D0B68; border-radius: 6px 0 0 6px; }
    .logo-shape2 { width: 65px; height: 34px; background: #7D71FF; border-radius: 0 6px 6px 0; }
    .search-bar { display: flex; flex-direction: row; align-items: center; padding: 20px 15px; gap: 5px; width: 626px; height: 59px; background: rgba(130,135,165,0.1); border-radius: 10px; }
    .search-bar span { font-weight: 400; font-size: 16px; line-height: 19px; color: #8287A5; }
    .user-block { display: flex; flex-direction: row; align-items: center; padding: 0; gap: 5px; width: 210px; height: 56px; }
    .user-avatar { width: 56px; height: 56px; border-radius: 50%; overflow: hidden; flex-shrink: 0; }
    .user-avatar .initials { width: 56px; height: 56px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 20px; }
    .user-info { display: flex; flex-direction: column; justify-content: center; gap: 5px; }
    .user-name { font-weight: 500; font-size: 16px; line-height: 19px; color: #0D0B68; }
    .main-layout { display: flex; flex-direction: row; align-items: flex-start; padding: 0; gap: 40px; width: 1404px; }
    .sidebar { display: flex; flex-direction: column; align-items: flex-start; padding: 0; gap: 15px; width: 240px; }
    .nav-item { display: flex; flex-direction: row; align-items: center; padding: 0 20px; gap: 10px; width: 240px; height: 49px; border-radius: 10px; cursor: pointer; font-weight: 500; font-size: 16px; line-height: 19px; color: #0D0B68; text-decoration: none; }
    .nav-item.active { background: #7D72FF; color: #fff; }
    .nav-item.active svg path { fill: #fff; stroke: #fff; }
    .nav-item svg { flex-shrink: 0; }
    .content { display: flex; flex-direction: column; gap: 30px; width: 750px; flex-shrink: 0; }
    .page-header-group { display: flex; flex-direction: column; gap: 8px; }
    .page-title { font-weight: 700; font-size: 28px; line-height: 34px; color: #0D0B68; }
    .page-subtitle { font-weight: 400; font-size: 14px; line-height: 17px; color: #8287A5; }

    /* tabs */
    .tabs-row { display: flex; flex-direction: row; gap: 15px; }
    .tab-btn { padding: 10px 0; font-weight: 400; font-size: 16px; line-height: 19px; color: #8287A5; cursor: pointer; border: none; background: none; }
    .tab-btn.active { font-weight: 600; color: #7D72FF; border-bottom: 4px solid #7D72FF; padding: 10px 0; }

    /* poll card */
    .poll-list { display: flex; flex-direction: column; gap: 20px; }
    .poll-card {
      display: flex; flex-direction: row; align-items: center; padding: 24px; gap: 24px;
      background: #FFFFFF; border: 2px solid rgba(130,135,165,0.1); border-radius: 20px;
      transition: box-shadow 0.2s;
    }
    .poll-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
    .poll-icon {
      width: 56px; height: 56px; border-radius: 14px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 28px;
    }
    .poll-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .poll-title { font-weight: 600; font-size: 18px; line-height: 22px; color: #0D0B68; }
    .poll-meta { font-weight: 400; font-size: 13px; line-height: 16px; color: #8287A5; display: flex; gap: 16px; flex-wrap: wrap; }
    .poll-meta span { display: flex; align-items: center; gap: 4px; }
    .poll-deadline {
      display: inline-flex; align-items: center; gap: 4px;
      font-weight: 500; font-size: 12px; line-height: 15px; padding: 4px 10px;
      border-radius: 100px; white-space: nowrap;
    }
    .deadline-urgent { background: #FEE2E2; color: #991B1B; }
    .deadline-soon { background: #FEF3C7; color: #92400E; }
    .deadline-ok { background: #D1FAE5; color: #065F46; }
    .poll-status {
      display: inline-flex; align-items: center; gap: 4px;
      font-weight: 600; font-size: 12px; line-height: 15px; padding: 6px 14px;
      border-radius: 100px; white-space: nowrap;
    }
    .status-pending { background: #FEF3C7; color: #92400E; }
    .status-done { background: #D1FAE5; color: #065F46; }
    .status-overdue { background: #FEE2E2; color: #991B1B; }
    .poll-actions { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
    .btn-primary {
      display: flex; flex-direction: row; justify-content: center; align-items: center;
      padding: 10px 20px; gap: 10px;
      background: #7D72FF; border-radius: 10px; border: none;
      font-weight: 500; font-size: 14px; line-height: 17px; color: #FFFFFF; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #6B5FE8; }
    .btn-secondary {
      display: flex; flex-direction: row; justify-content: center; align-items: center;
      padding: 10px 20px; gap: 10px;
      background: #EFF0FF; border-radius: 10px; border: none;
      font-weight: 500; font-size: 14px; line-height: 17px; color: #7D72FF; cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: #DFE0FF; }

    .divider { width: 100%; height: 2px; background: rgba(130,135,165,0.1); }
    .section-label { font-weight: 500; font-size: 16px; line-height: 19px; color: #8287A5; display: flex; align-items: center; gap: 8px; }
    .section-label svg { width: 20px; height: 20px; }

    .empty-state { text-align: center; padding: 60px 20px; color: #9CA3AF; background: rgba(130,135,165,0.05); border-radius: 20px; }
    .empty-state h3 { font-size: 18px; margin-bottom: 6px; color: #6B7280; }
    .empty-state p { font-size: 14px; }

    /* right sidebar */
    .right-sidebar { display: flex; flex-direction: column; gap: 30px; width: 250px; }
    .sidebar-card { display: flex; flex-direction: column; padding: 15px; gap: 15px; width: 100%; background: rgba(130,135,165,0.1); border-radius: 10px; }
    .sidebar-card-title { display: flex; flex-direction: row; align-items: center; gap: 5px; font-weight: 500; font-size: 16px; line-height: 19px; color: #8287A5; }
    .sidebar-card-title svg { width: 24px; height: 24px; }
    .stat-row { display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(130,135,165,0.08); }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-weight: 400; font-size: 14px; line-height: 17px; color: #8287A5; }
    .stat-value { font-weight: 600; font-size: 18px; line-height: 22px; color: #0D0B68; }
    .stat-value.red { color: #EF4444; }
    .stat-value.green { color: #10B981; }
    .stat-value.purple { color: #7D72FF; }
    .progress-mini { width: 100%; height: 6px; background: rgba(130,135,165,0.1); border-radius: 100px; overflow: hidden; margin-top: 8px; }
    .progress-mini-fill { height: 100%; border-radius: 100px; background: #7D72FF; transition: width 0.3s; }
  </style>
</head>
<body>
<div class="header">
  <div class="logo-row"><div class="logo-shape1"></div><div class="logo-shape2"></div></div>
  <div class="search-bar"><span>AI-Поиск</span></div>
  <div class="user-block"><div class="user-avatar"><div class="initials" style="background:linear-gradient(135deg,#7D72FF,#0D0B68);">ИА</div></div><div class="user-info"><div class="user-name">Иванов Александр</div></div></div>
</div>
<div class="main-layout">
  <div class="sidebar">
    <a class="nav-item" href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" fill="#fff" stroke="#0D0B68" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 22V12H15V22" fill="#fff" stroke="#0D0B68" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Главная</a>
    <a class="nav-item" href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" fill="#fff" stroke="#0D0B68" stroke-width="2"/><path d="M3 10H21" stroke="#0D0B68" stroke-width="2"/><path d="M16 2V6" stroke="#0D0B68" stroke-width="2" stroke-linecap="round"/><path d="M8 2V6" stroke="#0D0B68" stroke-width="2" stroke-linecap="round"/></svg>Календарь</a>
    <a class="nav-item" href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M19 3H5C3.89543 3 3 3.89543 3 5V19C3 20.1046 3.89543 21 5 21H19C20.1046 21 21 20.1046 21 19V5C21 3.89543 20.1046 3 19 3Z" fill="#fff" stroke="#0D0B68" stroke-width="2"/><path d="M7 7H17" stroke="#0D0B68" stroke-width="2" stroke-linecap="round"/><path d="M7 12H17" stroke="#0D0B68" stroke-width="2" stroke-linecap="round"/><path d="M7 17H13" stroke="#0D0B68" stroke-width="2" stroke-linecap="round"/></svg>События</a>
    <a class="nav-item active" href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="none" stroke="currentColor" stroke-width="2"/></svg>Опросы</a>
    <a class="nav-item" href="#"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M17 21V19C17 17.9391 16.5786 16.9217 15.8284 16.1716C15.0783 15.4214 14.0609 15 13 15H5C3.93913 15 2.92172 15.4214 2.17157 16.1716C1.42143 16.9217 1 17.9391 1 19V21" stroke="#0D0B68" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 11C11.2091 11 13 9.20914 13 7C13 4.79086 11.2091 3 9 3C6.79086 3 5 4.79086 5 7C5 9.20914 6.79086 11 9 11Z" stroke="#0D0B68" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Орг. структура</a>
  </div>
  <div class="content">
    <div class="page-header-group">
      <div class="page-title">📋 Назначенные опросы</div>
      <div class="page-subtitle">Опросы, назначенные вам для прохождения. Следите за дедлайнами.</div>
    </div>
    <div class="tabs-row">
      <button class="tab-btn active" data-tab="pending">К прохождению</button>
      <button class="tab-btn" data-tab="completed">Пройденные</button>
      <button class="tab-btn" data-tab="all">Все</button>
    </div>
    <div class="tab-content" id="tab-pending">
      <div class="poll-list" id="pending-list"></div>
    </div>
    <div class="tab-content" id="tab-completed" style="display:none;">
      <div class="poll-list" id="completed-list"></div>
    </div>
    <div class="tab-content" id="tab-all" style="display:none;">
      <div class="divider"></div>
      <div class="poll-list" id="all-list"></div>
    </div>
  </div>
  <div class="right-sidebar">
    <div class="sidebar-card">
      <div class="sidebar-card-title"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#8287A5" stroke-width="2"/><path d="M12 6V12L16 16" stroke="#8287A5" stroke-width="2" stroke-linecap="round"/></svg>Статистика</div>
      <div id="stats-summary"></div>
    </div>
    <div class="sidebar-card">
      <div class="sidebar-card-title"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="20" height="14" rx="2" stroke="#8287A5" stroke-width="2"/><path d="M2 10H22" stroke="#8287A5" stroke-width="2"/><path d="M8 2V6" stroke="#8287A5" stroke-width="2" stroke-linecap="round"/><path d="M16 2V6" stroke="#8287A5" stroke-width="2" stroke-linecap="round"/></svg>Горящие дедлайны</div>
      <div id="urgent-polls"></div>
    </div>
  </div>
</div>
<script>
var NOW=new Date(2026,5,23); // 23.06.2026
function parseDate(s){var p=s.split('.');return new Date(+p[2],+p[1]-1,+p[0]);}
function daysLeft(deadline){return Math.round((parseDate(deadline)-NOW)/86400000);}
function fmt(d){return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}

var polls=[
  {id:1,title:'Обратная связь по ПР #234',type:'PR Review',author:'Анна Смирнова',assigned:'10.06.2026',deadline:'25.06.2026',completed:false,icon:'🔍'},
  {id:2,title:'Monthly Engagement Survey — Июнь',type:'Engagement',author:'HR-департамент',assigned:'01.06.2026',deadline:'28.06.2026',completed:false,icon:'📊'},
  {id:3,title:'Оценка наставника — Период Q2',type:'Mentorship',author:'Отдел обучения',assigned:'15.06.2026',deadline:'30.06.2026',completed:false,icon:'👤'},
  {id:4,title:'360 Feedback — Коллеги',type:'Peer Review',author:'Система',assigned:'05.06.2026',deadline:'22.06.2026',completed:false,icon:'🔄'},
  {id:5,title:'Опрос удовлетворённости инструментами',type:'Tools Survey',author:'IT-департамент',assigned:'20.06.2026',deadline:'05.07.2026',completed:false,icon:'🛠'},
  {id:6,title:'Self Review Q2 2026',type:'Self Assessment',author:'Система',assigned:'01.04.2026',deadline:'15.05.2026',completed:true,icon:'⭐'},
  {id:7,title:'Оценка грейда — Февраль 2026',type:'Grade Review',author:'HR-департамент',assigned:'01.02.2026',deadline:'01.03.2026',completed:true,icon:'🏅'},
  {id:8,title:'ДНК-fit — Март 2026',type:'Personality Test',author:'Отдел обучения',assigned:'10.03.2026',deadline:'20.03.2026',completed:true,icon:'🧬'},
];
var iconsMap={'PR Review':'🔍','Engagement':'📊','Mentorship':'👤','Peer Review':'🔄','Tools Survey':'🛠','Self Assessment':'⭐','Grade Review':'🏅','Personality Test':'🧬'};
var iconBg={'PR Review':'#EFF0FF','Engagement':'#D1FAE5','Mentorship':'#FEF3C7','Peer Review':'#FEE2E2','Tools Survey':'#DBEAFE','Self Assessment':'#FFF7ED','Grade Review':'#F3E8FF','Personality Test':'#ECFDF5'};

function deadlineClass(dl){var d=daysLeft(dl);if(d<0)return 'deadline-urgent';if(d<=2)return 'deadline-urgent';if(d<=5)return 'deadline-soon';return 'deadline-ok';}
function deadlineLabel(dl){var d=daysLeft(dl);if(d<0)return '🔥 Просрочен на '+Math.abs(d)+' дн.';if(d===0)return '🔥 Сегодня';if(d===1)return '🔥 Завтра';if(d<=3)return '⏳ Осталось '+d+' дн.';return '📅 до '+dl;}
function statusClass(p){if(p.completed)return 'status-done';if(daysLeft(p.deadline)<0)return 'status-overdue';return 'status-pending';}
function statusLabel(p){if(p.completed)return '✅ Пройден';if(daysLeft(p.deadline)<0)return '❌ Просрочен';return '⏳ Ожидает';}

function renderPollList(containerId,items){
  var list=document.getElementById(containerId);
  if(!items.length){list.innerHTML='<div class="empty-state"><h3>Нет опросов</h3><p>Здесь пока ничего нет</p></div>';return;}
  list.innerHTML=items.map(function(p){
    var bg=iconBg[p.type]||'#EFF0FF';
    var ic=p.icon||iconsMap[p.type]||'📋';
    return '<div class="poll-card">'
      +'<div class="poll-icon" style="background:'+bg+';">'+ic+'</div>'
      +'<div class="poll-info">'
      +'<div class="poll-title">'+p.title+'</div>'
      +'<div class="poll-meta">'
      +'<span>👤 '+p.author+'</span>'
      +'<span>📅 Назначен: '+p.assigned+'</span>'
      +'<span class="poll-deadline '+deadlineClass(p.deadline)+'">'+deadlineLabel(p.deadline)+'</span>'
      +'</div>'
      +'</div>'
      +'<div class="poll-actions">'
      +'<span class="poll-status '+statusClass(p)+'">'+statusLabel(p)+'</span>'
      +(!p.completed?'<button class="btn-primary" onclick="alert(\'Переход к опросу: '+p.title+'\')">Пройти</button>':'')
      +(!p.completed&&daysLeft(p.deadline)>=0?'':'')
      +'</div>'
      +'</div>';
  }).join('');
}

function renderStats(){
  var total=polls.length;
  var completed=polls.filter(function(p){return p.completed;}).length;
  var pending=polls.filter(function(p){return !p.completed;}).length;
  var overdue=polls.filter(function(p){return !p.completed&&daysLeft(p.deadline)<0;}).length;
  var pct=total?Math.round(completed/total*100):0;
  var c=document.getElementById('stats-summary');
  c.innerHTML=''
    +'<div class="stat-row"><span class="stat-label">Всего назначено</span><span class="stat-value">'+total+'</span></div>'
    +'<div class="stat-row"><span class="stat-label">Пройдено</span><span class="stat-value green">'+completed+'</span></div>'
    +'<div class="stat-row"><span class="stat-label">Ожидают</span><span class="stat-value purple">'+pending+'</span></div>'
    +'<div class="stat-row"><span class="stat-label">Просрочено</span><span class="stat-value red">'+overdue+'</span></div>'
    +'<div class="progress-mini"><div class="progress-mini-fill" style="width:'+pct+'%"></div></div>'
    +'<div style="text-align:right;font-size:11px;color:#9CA3AF;margin-top:4px;">'+pct+'% выполнено</div>';
}

function renderUrgent(){
  var urgent=polls.filter(function(p){return !p.completed&&daysLeft(p.deadline)<=2;}).sort(function(a,b){return daysLeft(a.deadline)-daysLeft(b.deadline);});
  var c=document.getElementById('urgent-polls');
  if(!urgent.length){c.innerHTML='<div style="padding:10px;color:#9CA3AF;font-size:13px;">🎉 Горящих дедлайнов нет</div>';return;}
  c.innerHTML=urgent.map(function(p){
    return '<div class="event-item" style="display:flex;flex-direction:row;align-items:center;padding:10px;gap:5px;background:rgba(130,135,165,0.1);border-radius:5px;width:100%;">'
      +'<div class="event-info" style="flex:1;">'
      +'<div class="event-name" style="font-weight:400;font-size:14px;line-height:17px;color:#0D0B68;">'+p.title+'</div>'
      +'<div class="event-date" style="font-weight:400;font-size:12px;line-height:15px;color:#8287A5;">'+deadlineLabel(p.deadline)+'</div>'
      +'</div></div>';
  }).join('');
}

document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    this.classList.add('active');
    document.querySelectorAll('.tab-content').forEach(function(tc){tc.style.display='none';});
    document.getElementById('tab-'+this.dataset.tab).style.display='block';
  });
});

var pending=polls.filter(function(p){return !p.completed;});
var completed=polls.filter(function(p){return p.completed;});
renderPollList('pending-list',pending);
renderPollList('completed-list',completed);
renderPollList('all-list',polls);
renderStats();
renderUrgent();
</script>
</body>
</html>
